name: ci

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  lint_test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint
        run: |
          uv run ruff format --check
          uv run ruff check

      - name: Test
        run: uv run pytest

  increment_version:
    uses: automas-dev/reusable-workflows/.github/workflows/increment_version.yml@v1.0
    secrets: inherit
    with:
      dry-run: ${{ github.ref != 'refs/heads/main' || contains(github.event.head_commit.message, 'NO RELEASE') }}

    needs: [lint_test]

    permissions:
      contents: write
